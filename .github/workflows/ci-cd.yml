name: TradeDesk CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-style: true
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json

    - name: Install & Lint Server
      run: |
        cd server
        npm ci
        # Run lint if a script is defined, otherwise skip
        npm run lint --if-present

    - name: Install, Lint & Build Client
      run: |
        cd client
        npm ci
        npm run lint --if-present
        npm run build
