version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: tradedesk-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - tradedesk-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tradedesk-server
    ports:
      - "4001:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/tradedesk
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - tradedesk-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:4001
    container_name: tradedesk-client
    depends_on:
      - server
    networks:
      - tradedesk-network

  nginx:
    image: nginx:alpine
    container_name: tradedesk-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - tradedesk-network

volumes:
  mongo-data:

networks:
  tradedesk-network:
    driver: bridge
